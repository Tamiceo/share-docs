<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agentic OS — kanban UI 샘플</title>
  <style>
    :root{
      --bg:#0b1020; --bg2:#111936; --panel:#121a31; --panel2:#182140; --text:#eef2ff; --muted:#a5b4fc; --line:rgba(255,255,255,.08);
      --triage:#60a5fa; --wait:#f59e0b; --execute:#34d399; --done:#c084fc; --danger:#fb7185; --ok:#22c55e;
      --shadow:0 20px 60px rgba(0,0,0,.35); --radius:18px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:
      radial-gradient(circle at 15% 0%, rgba(139,92,246,.22), transparent 28%),
      radial-gradient(circle at 90% 10%, rgba(52,211,153,.12), transparent 26%),
      linear-gradient(180deg, var(--bg2), var(--bg));}
    .wrap{padding:20px;max-width:1680px;margin:0 auto}
    .hero{display:block;margin-bottom:14px}
    .hero-card,.side-card,.col,.modal,.toast{background:linear-gradient(180deg, rgba(18,26,49,.96), rgba(11,16,32,.96));border:1px solid var(--line);box-shadow:var(--shadow);border-radius:22px}
    .hero-card{padding:20px;margin-bottom:14px}
    .side-card{padding:16px}
    h1{margin:0;font-size:32px;letter-spacing:-.04em}
    .lead{margin:8px 0 0;color:#c7d2fe;line-height:1.55;max-width:84ch;font-size:14px}
    .meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
    .metric{min-width:140px;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:16px;padding:12px}
    .metric .k{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.14em}
    .metric .v{font-size:22px;font-weight:800;margin-top:6px}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:flex-end}
    .btn{appearance:none;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);padding:10px 12px;border-radius:999px;cursor:pointer;font-size:13px;transition:.18s}
    .btn:hover,.btn.active{border-color:rgba(139,92,246,.5);transform:translateY(-1px);background:rgba(139,92,246,.12)}
    .btn.primary{background:rgba(96,165,250,.18)}
    .btn.danger{background:rgba(251,113,133,.12)}
    .small{font-size:12px;color:#a5b4fc;line-height:1.45}
    details.bridge{margin-top:16px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.02);overflow:hidden}
    details.bridge > summary{list-style:none;cursor:pointer;padding:12px 14px;font-size:13px;font-weight:700;color:#dbeafe;display:flex;align-items:center;justify-content:space-between;gap:12px}
    details.bridge > summary::-webkit-details-marker{display:none}
    details.bridge > summary::after{content:'▾';color:#94a3b8}
    details.bridge[open] > summary::after{content:'▴'}
    .bridge-body{padding:0 14px 14px}
    .bridge-note{margin:0 0 10px;color:#cbd5e1;font-size:12px;line-height:1.45}
    .input,.textarea,select{width:100%;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.04);color:var(--text);padding:10px 12px;font:inherit}
    .textarea{min-height:110px;resize:vertical}
    .grid{display:grid;gap:10px}
    .grid.cols2{grid-template-columns:repeat(2,1fr)}
    .grid.cols3{grid-template-columns:repeat(3,1fr)}
    .board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px}
    .col{min-height:720px;overflow:hidden}
    .head{padding:14px 14px 12px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.03)}
    .head h2{margin:0;font-size:17px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .dot{width:10px;height:10px;border-radius:50%}
    .count{font-size:12px;color:#dbeafe;background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:999px;padding:4px 8px;white-space:nowrap}
    .head p{margin:8px 0 0;color:#cbd5e1;font-size:12px;line-height:1.45}
    .head-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .stack{padding:12px;display:flex;flex-direction:column;gap:10px;min-height:620px}
    .card{background:linear-gradient(180deg, rgba(24,33,64,.94), rgba(18,26,49,.98));border:1px solid var(--line);border-radius:16px;padding:12px;position:relative;cursor:grab;transition:.18s ease;outline:none}
    .card:hover{transform:translateY(-2px);border-color:rgba(139,92,246,.38);box-shadow:0 14px 28px rgba(0,0,0,.25)}
    .card.dragging{opacity:.45;transform:scale(.98)}
    .card:focus{box-shadow:0 0 0 3px rgba(139,92,246,.24), 0 14px 28px rgba(0,0,0,.25)}
    .row{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
    h3{margin:0;font-size:14px;line-height:1.35;letter-spacing:-.02em}
    .pill{font-size:11px;padding:5px 8px;border-radius:999px;background:rgba(255,255,255,.06);white-space:nowrap;color:#dbeafe}
    .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
    .t{font-size:11px;padding:4px 7px;border-radius:999px;background:rgba(255,255,255,.05);color:#dbeafe}
    .t.triage{background:rgba(96,165,250,.16);color:#bfdbfe}
    .t.wait{background:rgba(245,158,11,.16);color:#fde68a}
    .t.execute{background:rgba(52,211,153,.14);color:#a7f3d0}
    .t.done{background:rgba(192,132,252,.16);color:#e9d5ff}
    .desc{margin:8px 0 0;color:#b6c2ff;font-size:12px;line-height:1.45}
    .card-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
    .mini{font-size:11px;padding:6px 8px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:#e2e8ff;cursor:pointer}
    .mini:hover{background:rgba(255,255,255,.08)}
    .mini.warn{background:rgba(251,113,133,.12)}
    .mini.ok{background:rgba(34,197,94,.12)}

    .side-card h2{margin:0 0 8px;font-size:16px}
    .side-card .section{margin-bottom:14px}
    .side-card .section:last-child{margin-bottom:0}
    .log{max-height:170px;overflow:auto;display:flex;flex-direction:column;gap:8px}
    .log-item{font-size:12px;line-height:1.45;color:#dbeafe;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:12px;padding:10px}
    .log-item b{color:#fff}
    .example{font-size:12px;line-height:1.45;color:#cbd5e1;background:rgba(255,255,255,.03);border:1px dashed var(--line);border-radius:14px;padding:10px;white-space:pre-wrap}

    .overlay{position:fixed;inset:0;background:rgba(5,8,18,.72);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;padding:18px;z-index:40}
    .overlay.open{display:flex}
    .modal{width:min(1200px,100%);max-height:min(90vh,1000px);overflow:auto}
    .modal-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;padding:18px 18px 0}
    .modal-title{margin:0;font-size:24px;letter-spacing:-.03em}
    .close{border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);border-radius:999px;padding:10px 12px;cursor:pointer}
    .close:hover{background:rgba(255,255,255,.08)}
    .modal-sub{padding:4px 18px 18px;color:#c7d2fe;font-size:14px;line-height:1.55;border-bottom:1px solid var(--line)}
    .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:18px}
    .section-box{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:18px;padding:16px}
    .section-box h4{margin:0 0 10px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#93c5fd}
    .fields{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .field{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:14px;padding:12px}
    .label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#94a3b8;margin-bottom:6px}
    .value{font-size:14px;line-height:1.5;color:#eef2ff;font-weight:600;white-space:pre-wrap}
    .value.small{font-weight:500;color:#dbeafe}
    .timeline{display:flex;flex-direction:column;gap:10px}
    .step{display:grid;grid-template-columns:108px 1fr;gap:10px;align-items:start;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)}
    .step:last-child{border-bottom:0}
    .step .k{font-size:12px;color:#94a3b8;text-transform:uppercase;letter-spacing:.14em}
    .step .v{font-size:14px;line-height:1.5;color:#eef2ff;white-space:pre-wrap}
    .edit-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .edit-grid .full{grid-column:1/-1}
    .modal-actions{display:flex;gap:8px;justify-content:space-between;align-items:center;padding:0 18px 18px}
    .toast{position:fixed;right:18px;bottom:18px;padding:12px 14px;max-width:420px;background:linear-gradient(180deg, rgba(18,26,49,.98), rgba(11,16,32,.98));display:none;z-index:60}
    .toast.show{display:block}
    .toast strong{display:block;margin-bottom:4px}
    .hidden{display:none !important}

    @media (max-width:1200px){.hero{grid-template-columns:1fr}.board{grid-template-columns:repeat(2,1fr)}.modal-grid{grid-template-columns:1fr}.fields,.edit-grid{grid-template-columns:1fr}}
    @media (max-width:760px){.board{grid-template-columns:1fr}.meta{grid-template-columns:repeat(2,1fr)}.grid.cols2,.grid.cols3{grid-template-columns:1fr}.step{grid-template-columns:1fr}.modal-top{flex-direction:column}.close{align-self:flex-end}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="hero-card">
        <h1>Agentic OS</h1>
        <details class="bridge">
          <summary>Slack 업무요청 → 카드 생성</summary>
          <div class="bridge-body">
            <p class="bridge-note">Slack Workflow Builder나 수동 복붙으로 테스트할 때만 쓰는 입력창이야. 평소엔 접어두는 게 맞아.</p>
            <textarea id="slackPayload" class="textarea" placeholder='{"action":"create","title":"...","memo":"...","status":"triage"}'></textarea>
            <div style="height:10px"></div>
            <div class="toolbar" style="justify-content:flex-start">
              <button class="btn primary" id="applyPayloadBtn">Apply payload</button>
              <button class="btn" id="loadExampleBtn">Load example</button>
              <button class="btn danger" id="clearBoardBtn">Reset board</button>
            </div>
          </div>
        </details>
      </div>
      <div class="side-card">
        <div class="section">
          <h2>Activity log</h2>
          <div class="log" id="log"></div>
        </div>
      </div>
    </div>

    <div class="board" id="board"></div>
  </div>

  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-top">
        <div>
          <h2 class="modal-title" id="modalTitle">카드 상세</h2>
        </div>
        <button class="close" id="closeBtn" type="button">닫기</button>
      </div>
      <div class="modal-sub" id="modalSub">카드를 누르면 내용을 보고 수정할 수 있다.</div>
      <div class="modal-grid">
        <div class="section-box">
          <h4>EDIT</h4>
          <div class="edit-grid">
            <input class="input" id="editTitle" placeholder="title" />
            <select class="input" id="editStatus">
              <option value="triage">triage</option>
              <option value="wait">wait</option>
              <option value="execute">execute</option>
              <option value="done">done</option>
            </select>
            <input class="input" id="editOwner" placeholder="owner" />
            <input class="input" id="editAssignee" placeholder="assignee" />
            <input class="input" id="editSource" placeholder="source" />
            <input class="input" id="editResult" placeholder="result link / file" />
            <textarea class="textarea full" id="editMemo" placeholder="memo"></textarea>
            <textarea class="textarea full" id="editBlocked" placeholder="blocked reason"></textarea>
          </div>
        </div>
        <div class="section-box">
          <h4>DETAIL</h4>
          <div class="fields" id="fields"></div>
          <div style="height:12px"></div>
          <h4>FLOW</h4>
          <div class="timeline" id="timeline"></div>
        </div>
      </div>
      <div class="modal-actions">
        <div class="toolbar" style="justify-content:flex-start">
          <button class="btn" id="prevBtn">◀ 이전</button>
          <button class="btn" id="nextBtn">다음 ▶</button>
          <button class="btn" id="duplicateBtn">Duplicate</button>
        </div>
        <div class="toolbar" style="justify-content:flex-end">
          <button class="btn danger" id="deleteBtn">Delete</button>
          <button class="btn primary" id="saveBtn">Save changes</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ===== Agentic OS UI 샘플 — 데이터 연결 없음 (목업만) =====
    // 원래 Supabase 실시간 연동본에서 DB 계층을 걷어낸 UI 껍데기 데모.
    // 카드 조작은 브라우저 메모리에서만 동작하고, 새로고침하면 목업 시드로 리셋된다.

    const STAGES = ['triage','wait','execute','done'];
    const STAGE_META = {
      triage: {label:'Triage', color:'var(--triage)', desc:'Slack 요청을 카드로 만든다.'},
      wait: {label:'Wait', color:'var(--wait)', desc:'선행조건 / 시간 / 배포 대기'},
      execute: {label:'Execute', color:'var(--execute)', desc:'실제 작업을 수행한다.'},
      done: {label:'Done', color:'var(--done)', desc:'완료 시그널과 결과를 남긴다.'},
    };

    const el = {
      board: document.getElementById('board'),
      log: document.getElementById('log'),
      overlay: document.getElementById('overlay'),
      closeBtn: document.getElementById('closeBtn'),
      modalTitle: document.getElementById('modalTitle'),
      modalSub: document.getElementById('modalSub'),
      fields: document.getElementById('fields'),
      timeline: document.getElementById('timeline'),
      editTitle: document.getElementById('editTitle'),
      editStatus: document.getElementById('editStatus'),
      editOwner: document.getElementById('editOwner'),
      editAssignee: document.getElementById('editAssignee'),
      editSource: document.getElementById('editSource'),
      editResult: document.getElementById('editResult'),
      editMemo: document.getElementById('editMemo'),
      editBlocked: document.getElementById('editBlocked'),
      saveBtn: document.getElementById('saveBtn'),
      deleteBtn: document.getElementById('deleteBtn'),
      duplicateBtn: document.getElementById('duplicateBtn'),
      prevBtn: document.getElementById('prevBtn'),
      nextBtn: document.getElementById('nextBtn'),
      slackPayload: document.getElementById('slackPayload'),
      applyPayloadBtn: document.getElementById('applyPayloadBtn'),
      loadExampleBtn: document.getElementById('loadExampleBtn'),
      clearBoardBtn: document.getElementById('clearBoardBtn'),
      toast: document.getElementById('toast'),
    };

    function uid(){ return 'c' + Math.random().toString(16).slice(2,8) + Date.now().toString(36).slice(-4); }
    let state = { cards: [], log: [] };
    let dragId = null;
    let editingId = null;

    function timeAgo(iso){
      const ts = iso ? new Date(iso).getTime() : Date.now();
      const mins = Math.max(1, Math.round((Date.now()-ts)/60000));
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.round(mins/60);
      return `${hrs}h ago`;
    }
    function escapeHtml(s){
      return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }
    function showToast(title, body){
      el.toast.innerHTML = `<strong>${escapeHtml(title)}</strong><div>${escapeHtml(body)}</div>`;
      el.toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => el.toast.classList.remove('show'), 2800);
    }
    function pushLog(text){
      state.log.unshift({ts:Date.now(), text});
      state.log = state.log.slice(0, 25);
      renderLog();
      showToast('OK', text);
    }
    function find(id){ return state.cards.find(c => c.id === id); }
    function stageIndex(status){ return STAGES.indexOf(status); }

    // ---- 로컬 데이터 계층 (메모리만, DB 없음) ----
    function SEED_CARDS(){
      const now = Date.now();
      const iso = m => new Date(now - m*60000).toISOString();
      return [
        {id:uid(), title:'경쟁사 신규 기능 3건 리서치', status:'triage', owner:'순희', assignee:'철수', source:'slack', memo:'슬랙 미션에서 카드 생성', blocked:'', result:'', created_at:iso(2), updated_at:iso(2)},
        {id:uid(), title:'주간 콘텐츠 캘린더 초안', status:'wait', owner:'순희', assignee:'철수', source:'slack', memo:'디자인 에셋 준비 대기', blocked:'에셋 대기', result:'', created_at:iso(35), updated_at:iso(20)},
        {id:uid(), title:'고객 문의 티켓 자동 분류', status:'execute', owner:'순희', assignee:'철수', source:'cron', memo:'철수가 실행 중', blocked:'', result:'', created_at:iso(70), updated_at:iso(5)},
        {id:uid(), title:'옵시디안 인박스 리서치 노트', status:'done', owner:'순희', assignee:'철수', source:'slack', memo:'', blocked:'', result:'노트 3건 작성 완료', created_at:iso(140), updated_at:iso(90)},
      ];
    }
    function loadCards(){ render(); }
    function dbInsert(card){
      const now = new Date().toISOString();
      const rec = { id: uid(), created_at: now, updated_at: now, ...card };
      state.cards.unshift(rec);
      return rec;
    }
    function dbUpdate(id, patch){
      const c = find(id); if (!c) return false;
      Object.assign(c, patch, { updated_at: new Date().toISOString() });
      return true;
    }
    function dbDelete(id){
      const before = state.cards.length;
      state.cards = state.cards.filter(c => c.id !== id);
      return state.cards.length < before;
    }

    // ---- mutations (메모리 state 변경 후 화면 갱신) ----
    async function createCard(prefill={}){
      const title = (prefill.title || prompt('카드 제목?') || '').trim();
      if (!title) return;
      const created = await dbInsert({
        title, memo: prefill.memo || '', status: prefill.status || 'triage',
        owner: prefill.owner || '담당 에이전트', assignee: prefill.assignee || prefill.owner || '담당 에이전트',
        source: prefill.source || 'manual', blocked: prefill.blocked || '', result: prefill.result || ''
      });
      if (created){ await loadCards(); pushLog(`${created.title} :: created in ${created.status}`); openCard(created.id); }
    }
    async function moveCard(id, nextStatus, reason='moved'){
      const c = find(id); if (!c) return;
      const prev = c.status;
      const patch = { status: nextStatus };
      if (nextStatus === 'done' && !c.result) patch.result = 'result pending';
      if (await dbUpdate(id, patch)){
        await loadCards();
        pushLog(`${c.title} :: ${prev} → ${nextStatus} (${reason})`);
        if (editingId === id) openCard(id);
      }
    }
    async function deleteCard(id){
      const c = find(id); if (!c) return;
      if (await dbDelete(id)){ closeModal(); await loadCards(); pushLog(`${c.title} :: deleted`); }
    }
    async function duplicateCard(id){
      const c = find(id); if (!c) return;
      const created = await dbInsert({
        title: c.title + ' (copy)', memo: c.memo, status: c.status, owner: c.owner,
        assignee: c.assignee, source: c.source, blocked: c.blocked, result: c.result
      });
      if (created){ await loadCards(); pushLog(`${c.title} :: duplicated`); }
    }

    // ---- Slack payload 수동 테스트 (Apply payload 버튼) ----
    async function applyPayload(){
      const raw = el.slackPayload.value.trim();
      if (!raw) return showToast('payload', 'JSON을 넣어줘.');
      let payload;
      try { payload = JSON.parse(raw); } catch (e) { return showToast('payload error', e.message); }
      const action = (payload.action || 'create').toLowerCase();
      if (action === 'create'){
        const created = await dbInsert({
          title: payload.title || payload.text || 'Slack 업무요청',
          memo: payload.memo || payload.text || '', status: payload.status || 'triage',
          owner: payload.owner || '담당 에이전트', assignee: payload.assignee || payload.owner || '담당 에이전트',
          source: 'slack', blocked: payload.blocked || '', result: payload.result || ''
        });
        if (created){ await loadCards(); pushLog(`Slack 요청 :: ${created.title} → ${created.status}`); }
      } else if (action === 'update'){
        const target = payload.id ? find(payload.id) : state.cards[0];
        if (!target) return showToast('update', '대상 카드가 없어.');
        if (await dbUpdate(target.id, {
          title: payload.title ?? target.title, memo: payload.memo ?? target.memo,
          status: payload.status ?? target.status, owner: payload.owner ?? target.owner,
          assignee: payload.assignee ?? target.assignee, source: 'slack',
          blocked: payload.blocked ?? target.blocked, result: payload.result ?? target.result
        })){ await loadCards(); pushLog(`Slack update :: ${target.title}`); }
      } else if (action === 'move'){
        const target = payload.id ? find(payload.id) : state.cards[0];
        if (!target) return showToast('move', '대상 카드가 없어.');
        if (!STAGES.includes(payload.status)) return showToast('move', 'status는 triage/wait/execute/done 중 하나여야 해.');
        await moveCard(target.id, payload.status, 'slack payload');
      } else {
        return showToast('payload', 'action은 create/update/move만 지원.');
      }
    }

    // ---- render ----
    function cardHtml(c){
      return `
        <article class="card" draggable="true" tabindex="0" data-id="${c.id}">
          <div class="row"><h3>${escapeHtml(c.title)}</h3><span class="pill">${escapeHtml(c.status)}</span></div>
          <div class="tags"><span class="t ${c.status}">${escapeHtml(c.source || 'manual')}</span><span class="t">${escapeHtml(c.owner || '—')}</span><span class="t">${timeAgo(c.updated_at)}</span></div>
          <p class="desc">${escapeHtml(c.memo || '')}</p>
          ${c.blocked ? `<p class="desc" style="color:#fde68a">Blocked: ${escapeHtml(c.blocked)}</p>` : ''}
          ${c.result ? `<p class="desc" style="color:#a7f3d0">Result: ${escapeHtml(c.result)}</p>` : ''}
          <div class="card-actions">
            <button class="mini" data-action="edit">Edit</button>
            <button class="mini ok" data-action="prev">◀</button>
            <button class="mini ok" data-action="next">▶</button>
            <button class="mini warn" data-action="done">Done</button>
          </div>
        </article>`;
    }
    function renderBoard(){
      el.board.innerHTML = STAGES.map(status => {
        const cards = state.cards.filter(c => c.status === status);
        return `
          <section class="col" data-status="${status}">
            <div class="head">
              <h2><span style="display:flex;align-items:center;gap:8px"><span class="dot" style="background:${STAGE_META[status].color}"></span>${STAGE_META[status].label}</span><span class="count">${cards.length}</span></h2>
              <p>${STAGE_META[status].desc}</p>
              <div class="head-actions"><button class="mini" data-add="${status}">+ 카드 추가</button></div>
            </div>
            <div class="stack" data-dropzone="${status}">
              ${cards.map(cardHtml).join('') || `<div class="small" style="padding:10px;opacity:.8">비어 있음</div>`}
            </div>
          </section>`;
      }).join('');
    }
    function renderLog(){
      el.log.innerHTML = state.log.map(item => `<div class="log-item"><b>${new Date(item.ts).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}</b><br>${escapeHtml(item.text)}</div>`).join('');
    }
    function render(){ renderBoard(); renderLog(); wireBoardEvents(); }

    function openCard(id){
      const c = find(id); if (!c) return;
      editingId = id;
      el.modalTitle.textContent = c.title;
      el.modalSub.textContent = `${c.status.toUpperCase()} · ${c.owner || '—'} · ${c.assignee || '—'} · ${c.source || 'manual'}`;
      el.editTitle.value = c.title || '';
      el.editStatus.value = c.status || 'triage';
      el.editOwner.value = c.owner || '';
      el.editAssignee.value = c.assignee || '';
      el.editSource.value = c.source || '';
      el.editResult.value = c.result || '';
      el.editMemo.value = c.memo || '';
      el.editBlocked.value = c.blocked || '';
      el.fields.innerHTML = [
        ['id', c.id], ['created', c.created_at ? new Date(c.created_at).toLocaleString('ko-KR') : ''], ['updated', c.updated_at ? new Date(c.updated_at).toLocaleString('ko-KR') : ''], ['status', c.status],
        ['owner', c.owner || ''], ['assignee', c.assignee || ''], ['source', c.source || ''], ['result', c.result || '']
      ].map(([k,v]) => `<div class="field"><div class="label">${escapeHtml(k)}</div><div class="value">${escapeHtml(v)}</div></div>`).join('');
      el.timeline.innerHTML = [
        ['request', c.memo || ''], ['blocked', c.blocked || '—'], ['next move', STAGES[Math.min(stageIndex(c.status)+1, STAGES.length-1)]], ['last signal', c.status === 'done' ? 'done' : 'pending']
      ].map(([k,v]) => `<div class="step"><div class="k">${escapeHtml(k)}</div><div class="v">${escapeHtml(v)}</div></div>`).join('');
      el.overlay.classList.add('open');
      el.overlay.setAttribute('aria-hidden','false');
    }
    function closeModal(){
      el.overlay.classList.remove('open');
      el.overlay.setAttribute('aria-hidden','true');
      editingId = null;
    }

    function wireBoardEvents(){
      document.querySelectorAll('.card').forEach(card => {
        const id = card.dataset.id;
        card.ondragstart = () => { dragId = id; card.classList.add('dragging'); };
        card.ondragend = () => { dragId = null; card.classList.remove('dragging'); };
        card.onclick = (e) => {
          const action = e.target?.dataset?.action;
          if (action){
            e.stopPropagation();
            if (action === 'edit') openCard(id);
            else if (action === 'prev') moveCard(id, STAGES[Math.max(stageIndex(find(id).status)-1,0)], 'button');
            else if (action === 'next') moveCard(id, STAGES[Math.min(stageIndex(find(id).status)+1,STAGES.length-1)], 'button');
            else if (action === 'done') moveCard(id, 'done', 'button');
            return;
          }
          openCard(id);
        };
      });
      document.querySelectorAll('[data-add]').forEach(btn => {
        btn.onclick = () => createCard({status: btn.dataset.add});
      });
      document.querySelectorAll('[data-dropzone]').forEach(zone => {
        zone.ondragover = e => { e.preventDefault(); zone.style.outline = '2px solid rgba(139,92,246,.45)'; };
        zone.ondragleave = () => { zone.style.outline = 'none'; };
        zone.ondrop = e => {
          e.preventDefault(); zone.style.outline = 'none';
          if (!dragId) return;
          moveCard(dragId, zone.dataset.dropzone, 'drag');
        };
      });
    }

    // ---- 이벤트 핸들러 ----
    el.saveBtn.onclick = async () => {
      if (!editingId) return;
      const c = find(editingId); if (!c) return;
      const oldStatus = c.status;
      const nextStatus = el.editStatus.value;
      if (await dbUpdate(editingId, {
        title: el.editTitle.value.trim() || c.title, status: nextStatus,
        owner: el.editOwner.value.trim(), assignee: el.editAssignee.value.trim(),
        source: el.editSource.value.trim(), result: el.editResult.value.trim(),
        memo: el.editMemo.value.trim(), blocked: el.editBlocked.value.trim()
      })){
        await loadCards();
        if (oldStatus !== nextStatus) pushLog(`${c.title} :: ${oldStatus} → ${nextStatus} (edit)`);
        else pushLog(`${c.title} :: edited`);
        showToast('saved', `${c.title} 업데이트 완료`);
      }
    };
    el.deleteBtn.onclick = () => editingId && deleteCard(editingId);
    el.duplicateBtn.onclick = () => editingId && duplicateCard(editingId);
    el.prevBtn.onclick = () => editingId && moveCard(editingId, STAGES[Math.max(stageIndex(find(editingId).status)-1,0)], 'modal');
    el.nextBtn.onclick = () => editingId && moveCard(editingId, STAGES[Math.min(stageIndex(find(editingId).status)+1,STAGES.length-1)], 'modal');
    el.closeBtn.onclick = closeModal;
    el.overlay.onclick = e => { if (e.target === el.overlay) closeModal(); };
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    el.applyPayloadBtn.onclick = applyPayload;
    el.loadExampleBtn.onclick = () => {
      el.slackPayload.value = JSON.stringify({
        action:'create',
        title:'Slack에서 온 새 업무',
        memo:'triage 카드 생성 → 담당자 배분 → wait 이동',
        status:'triage',
        owner:'담당 에이전트',
        assignee:'담당 에이전트',
        source:'slack',
      }, null, 2);
    };
    el.clearBoardBtn.onclick = () => {
      if (!confirm('보드의 모든 카드를 지울까? (메모리에서만 — 새로고침하면 목업이 다시 뜸)')) return;
      state.cards = []; state.log = []; loadCards(); pushLog('board reset');
    };

    // ---- init: 목업 시드 (새로고침하면 이걸로 리셋) ----
    state.cards = SEED_CARDS();
    render();

    // expose a tiny bridge for manual console use / Slack automation scripts
    window.AGENTIC_OS = {
      getState: () => structuredClone(state),
      create: createCard,
      move: (id, status) => moveCard(id, status, 'window.AGENTIC_OS'),
      update: (id, patch) => { const ok = dbUpdate(id, patch); if (ok) loadCards(); return ok; },
      ingest: (payload) => { el.slackPayload.value = JSON.stringify(payload, null, 2); applyPayload(); },
    };
  </script>
</body>
</html>
